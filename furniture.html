<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FORMA — Modern Furniture</title>

  <!-- Tailwind + GSAP (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>

  <!-- Modern grotesk + serif accent -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Brand theme -->
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { sand: '#ece6dd', terra: '#c0613f', charcoal: '#2b2723', olive: '#6b6a4b' },
        fontFamily: { serif: ['"DM Serif Display"', 'serif'], sans: ['Inter', 'sans-serif'] },
      }},
    };
  </script>
  <style>
    body { background: #ece6dd; }
    .reveal { opacity: 0; transform: translateY(40px); }

  </style>
</head>

<body class="font-sans text-charcoal antialiased selection:bg-terra selection:text-sand intro-lock">

</body>
</html>
