<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOLE — Streetwear Sneakers</title>

  <!-- Tailwind + GSAP (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>

  <!-- Bold display + sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Brand theme -->
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { jet: '#0c0c0c', volt: '#d6ff2e', coal: '#161616' },
        fontFamily: { display: ['Anton', 'sans-serif'], sans: ['Inter', 'sans-serif'] },
      }},
    };
  </script>
  <style>
    body { background: #0c0c0c; }
    .reveal { opacity: 0; transform: translateY(50px); }
    .marquee { animation: marquee 18s linear infinite; }
    @keyframes marquee { from { transform: translateX(0) } to { transform: translateX(-50%) } }
    .outline-text { -webkit-text-stroke: 2px #d6ff2e; color: transparent; }

  </style>
</head>

<body class="font-sans text-white antialiased selection:bg-volt selection:text-jet">

</body>
</html>
