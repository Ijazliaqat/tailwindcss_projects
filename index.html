<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="LUXE — Premium curated essentials." />
  <title>LUXE — Premium Essentials</title>

  <!--  Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Tailwind theme extension — brand tokens, fonts, animations
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: '#0a0a0f',
            charcoal: '#13131a',
            accent: '#a78bfa',     // soft violet
            accent2: '#f0abfc',    // pink
            gold: '#e8c98a',
          },
          fontFamily: {
            display: ['"Space Grotesk"', 'system-ui', 'sans-serif'],
            body: ['"Inter"', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            glow: '0 0 60px -15px rgba(167,139,250,0.6)',
            card: '0 30px 60px -20px rgba(0,0,0,0.6)',
          },
        },
      },
    };
  </script>

  <!-- ============ Fonts ============ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- ============ GSAP + ScrollTrigger (CDN) ============ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <!-- ============ Lenis — buttery smooth scroll ============ -->
  <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>

  <!-- ============ Minimal custom CSS (only what Tailwind can't express cleanly) ============ -->
  <style>
    :root { color-scheme: dark; }
    html, body { background: #0a0a0f; }
    body { -webkit-font-smoothing: antialiased; overflow-x: hidden; }
  </style>
</head>

<body class="font-body text-white selection:bg-accent/40">
</body>
</html>
